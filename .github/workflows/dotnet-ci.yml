name: .NET CI

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'hotfix/**'
      - 'warranty/**'
      - 'debt/**'
      - 'sonar'
      - 'R*-main'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      nuget_version: ${{ steps.version.outputs.nuget_version }}

    steps:
      - name: Checkout (full history for NBGV)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install NBGV CLI tool
        run: dotnet tool install --global nbgv

      - name: Detect version
        id: version
        run: |
          TARGET="${{ github.base_ref }}"
          FORK_RAW=$(jq -r '.fork // empty' version.json)
          FORK_NUM=$(echo "$FORK_RAW" | tr -d '[:alpha:]')  # "R14" → "14"

          if [[ "${{ github.event_name }}" == "pull_request" && \
                ( "$TARGET" == "dev" || "$TARGET" == "qa" || "$TARGET" == "uat" ) ]]; then
            IS_ENV_PR=true
            SIMPLE=$(nbgv get-version -v SimpleVersion)
            MAJOR=$(echo "$SIMPLE" | cut -d'.' -f1)
            HEIGHT=$(echo "$SIMPLE" | cut -d'.' -f3)
            PR="${{ github.event.pull_request.number }}"
            if [[ -n "$FORK_NUM" ]]; then
              BASE="${MAJOR}.${FORK_NUM}.${HEIGHT}"
            else
              BASE="$SIMPLE"
            fi
            NUGET_VERSION="${BASE}-pr${PR}"
            SEMVER="$NUGET_VERSION"
            ASM_INFO="$SEMVER"
          else
            IS_ENV_PR=false
            NUGET_VERSION=$(nbgv get-version -v NuGetPackageVersion)
            SEMVER=$(nbgv get-version -v SemVer2)
            ASM_INFO=$(nbgv get-version -v AssemblyInformationalVersion)
          fi
          echo "nuget_version=$NUGET_VERSION" >> $GITHUB_OUTPUT
          echo "semver=$SEMVER" >> $GITHUB_OUTPUT
          echo "asm_info=$ASM_INFO" >> $GITHUB_OUTPUT
          echo "is_env_pr=$IS_ENV_PR" >> $GITHUB_OUTPUT
          echo "Branch  : ${TARGET:-$GITHUB_REF_NAME}"
          echo "Version : $SEMVER"

      - name: Restore
        run: dotnet restore VersioningPoC.sln

      - name: Build
        run: |
          if [[ "${{ steps.version.outputs.is_env_pr }}" == "true" ]]; then
            dotnet build VersioningPoC.sln --configuration Release --no-restore \
              -p:PackageVersion="${{ steps.version.outputs.nuget_version }}" \
              -p:AssemblyInformationalVersion="${{ steps.version.outputs.asm_info }}"
          else
            dotnet build VersioningPoC.sln --configuration Release --no-restore
          fi

      - name: Test
        run: dotnet test VersioningPoC.sln --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage"

      - name: Publish API
        run: >
          dotnet publish src/Versioning.Api/Versioning.Api.csproj
          --configuration Release
          --no-build
          --output publish/api

      - name: Publish Worker
        run: >
          dotnet publish src/Versioning.Worker/Versioning.Worker.csproj
          --configuration Release
          --no-build
          --output publish/worker

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: versioning-api-${{ steps.version.outputs.nuget_version }}
          path: publish/api/
          retention-days: 7

      - name: Upload Worker artifact
        uses: actions/upload-artifact@v4
        with:
          name: versioning-worker-${{ steps.version.outputs.nuget_version }}
          path: publish/worker/
          retention-days: 7

      - name: Summary
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.base_ref || github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SemVer | \`${{ steps.version.outputs.semver }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| NuGet  | \`${{ steps.version.outputs.nuget_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifacts | API + Worker |" >> $GITHUB_STEP_SUMMARY

  deploy:
    needs: build
    runs-on: windows-latest
    if: github.event_name == 'pull_request' && (github.base_ref == 'dev' || github.base_ref == 'qa' || github.base_ref == 'uat')

    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: versioning-api-${{ needs.build.outputs.nuget_version }}
          path: publish\api

      - name: Install Web Deploy
        run: choco install webdeploy --yes --no-progress

      - name: Deploy API via WebDeploy
        shell: pwsh
        run: |
          $msdeploy = "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe"
          $source = "contentPath=${{ github.workspace }}\publish\api"
          $dest   = "contentPath=${{ secrets.MSDEPLOY_SITE }},computerName=https://${{ secrets.MSDEPLOY_SERVER }}:8172/msdeploy.axd?site=${{ secrets.MSDEPLOY_SITE }},userName=${{ secrets.MSDEPLOY_USER }},password=${{ secrets.MSDEPLOY_PASSWORD }},authType=Basic"
          & $msdeploy -verb:sync "-source:$source" "-dest:$dest" -allowUntrusted
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Deploy summary
        shell: pwsh
        run: |
          Add-Content $env:GITHUB_STEP_SUMMARY "### Deploy Summary`n"
          Add-Content $env:GITHUB_STEP_SUMMARY "| Campo | Valor |`n|---|---|"
          Add-Content $env:GITHUB_STEP_SUMMARY "| Versión desplegada | ``${{ needs.build.outputs.nuget_version }}`` |"
          Add-Content $env:GITHUB_STEP_SUMMARY "| Ambiente | ``${{ github.base_ref }}`` |"
          Add-Content $env:GITHUB_STEP_SUMMARY "| URL | http://poctest.runasp.net/version |"
          Add-Content $env:GITHUB_STEP_SUMMARY "| PR | #${{ github.event.pull_request.number }} |"
